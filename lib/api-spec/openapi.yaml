openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: HACCP Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tenants
    description: Tenant (company) operations
  - name: markets
    description: Market/branch operations
  - name: categories
    description: HACCP category operations
  - name: sections
    description: HACCP section operations
  - name: formDefinitions
    description: Form definition operations
  - name: formInstances
    description: Form instance operations
  - name: formEntries
    description: Form entry operations
  - name: users
    description: User operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      summary: List all tenants
      responses:
        "200":
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tenant"

  /markets:
    get:
      operationId: listMarkets
      tags: [markets]
      summary: List all markets
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of markets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Market"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all HACCP categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /categories/{categoryId}/sections:
    get:
      operationId: listSections
      tags: [sections]
      summary: List sections for a category
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of sections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Section"

  /sections/{sectionId}/form-definitions:
    get:
      operationId: listFormDefinitions
      tags: [formDefinitions]
      summary: List form definitions for a section
      parameters:
        - name: sectionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of form definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FormDefinition"

  /form-instances:
    get:
      operationId: listFormInstances
      tags: [formInstances]
      summary: List form instances
      parameters:
        - name: marketId
          in: query
          required: true
          schema:
            type: integer
        - name: sectionId
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of form instances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FormInstance"
    post:
      operationId: createFormInstance
      tags: [formInstances]
      summary: Create a new form instance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFormInstance"
      responses:
        "201":
          description: Created form instance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormInstance"

  /form-instances/{instanceId}/entries:
    get:
      operationId: listFormEntries
      tags: [formEntries]
      summary: List form entries for an instance
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of form entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FormEntry"
    post:
      operationId: createFormEntry
      tags: [formEntries]
      summary: Create a new form entry
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFormEntry"
      responses:
        "201":
          description: Created form entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormEntry"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List registered users
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/register:
    post:
      operationId: registerUser
      tags: [users]
      summary: Register a new user with initials and PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUser"
      responses:
        "201":
          description: Registered user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "409":
          description: Initials already taken
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error

  /users/suggest-initials:
    post:
      operationId: suggestInitials
      tags: [users]
      summary: Suggest unique initials for a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                tenantId:
                  type: integer
              required:
                - firstName
                - lastName
                - tenantId
      responses:
        "200":
          description: Suggested initials
          content:
            application/json:
              schema:
                type: object
                properties:
                  suggestion:
                    type: string
                  alternatives:
                    type: array
                    items:
                      type: string
                required:
                  - suggestion
                  - alternatives

  /users/verify-pin:
    post:
      operationId: verifyPin
      tags: [users]
      summary: Verify user PIN (identifies user automatically)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                initials:
                  type: string
                pin:
                  type: string
                tenantId:
                  type: integer
              required:
                - pin
                - tenantId
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  userId:
                    type: integer
                    nullable: true
                  userName:
                    type: string
                    nullable: true
                  initials:
                    type: string
                    nullable: true
                required:
                  - valid

  /users/{userId}/reset:
    put:
      operationId: resetUserCredentials
      tags: [users]
      summary: Admin resets user initials and PIN
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                initials:
                  type: string
                pin:
                  type: string
              required:
                - initials
                - pin
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /training-topics:
    get:
      operationId: listTrainingTopics
      tags: [training]
      summary: List all default training topics
      responses:
        "200":
          description: List of training topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingTopic"

  /markets/{marketId}/training-sessions:
    get:
      operationId: listTrainingSessions
      tags: [training]
      summary: List training sessions for a market
      parameters:
        - name: marketId
          in: path
          required: true
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of training sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingSession"
    post:
      operationId: createTrainingSession
      tags: [training]
      summary: Create a new training session
      parameters:
        - name: marketId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrainingSession"
      responses:
        "201":
          description: Created training session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingSession"

  /training-sessions/{sessionId}:
    get:
      operationId: getTrainingSession
      tags: [training]
      summary: Get a training session with details
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Training session with topics and attendances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingSessionDetail"
    put:
      operationId: updateTrainingSession
      tags: [training]
      summary: Update a training session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTrainingSession"
      responses:
        "200":
          description: Updated training session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingSessionDetail"
    delete:
      operationId: deleteTrainingSession
      tags: [training]
      summary: Delete a training session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /training-sessions/{sessionId}/attendance:
    post:
      operationId: addTrainingAttendance
      tags: [training]
      summary: Add attendance to a training session (user confirms with initials)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTrainingAttendance"
      responses:
        "201":
          description: Attendance added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingAttendance"

  /training-sessions/{sessionId}/attendance/{attendanceId}:
    delete:
      operationId: removeTrainingAttendance
      tags: [training]
      summary: Remove attendance from a training session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
        - name: attendanceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Attendance removed

  /markets/{marketId}/responsibilities:
    get:
      operationId: listResponsibilities
      tags: [responsibilities]
      summary: List responsibilities for a market
      parameters:
        - name: marketId
          in: path
          required: true
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of responsibilities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Responsibility"
    put:
      operationId: upsertResponsibilities
      tags: [responsibilities]
      summary: Create or update responsibilities for a market
      parameters:
        - name: marketId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertResponsibilities"
      responses:
        "200":
          description: Updated responsibilities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Responsibility"

  /markets/{marketId}/info:
    get:
      operationId: getMarketInfo
      tags: [markets]
      summary: Get market info
      parameters:
        - name: marketId
          in: path
          required: true
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Market info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketInfoResponse"
    put:
      operationId: upsertMarketInfo
      tags: [markets]
      summary: Create or update market info
      parameters:
        - name: marketId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertMarketInfo"
      responses:
        "200":
          description: Updated market info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketInfoResponse"

  /seed:
    post:
      operationId: seedData
      tags: [tenants]
      summary: Seed initial HACCP data
      responses:
        "200":
          description: Data seeded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Tenant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt

    Market:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        name:
          type: string
        code:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - tenantId
        - name
        - code
        - createdAt

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        label:
          type: string
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - label
        - sortOrder
        - createdAt

    Section:
      type: object
      properties:
        id:
          type: integer
        categoryId:
          type: integer
        number:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - categoryId
        - number
        - title
        - sortOrder
        - createdAt

    FormDefinition:
      type: object
      properties:
        id:
          type: integer
        sectionId:
          type: integer
        fieldName:
          type: string
        fieldType:
          type: string
          enum: [temperature, boolean, text, photo, signature, pin]
        label:
          type: string
        required:
          type: boolean
        validationMin:
          type: number
          nullable: true
        validationMax:
          type: number
          nullable: true
        warningThreshold:
          type: number
          nullable: true
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - sectionId
        - fieldName
        - fieldType
        - label
        - required
        - sortOrder
        - createdAt

    FormInstance:
      type: object
      properties:
        id:
          type: integer
        marketId:
          type: integer
        sectionId:
          type: integer
        year:
          type: integer
        month:
          type: integer
        status:
          type: string
          enum: [open, closed]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - marketId
        - sectionId
        - year
        - month
        - status
        - createdAt

    CreateFormInstance:
      type: object
      properties:
        marketId:
          type: integer
        sectionId:
          type: integer
        year:
          type: integer
        month:
          type: integer
      required:
        - marketId
        - sectionId
        - year
        - month

    FormEntry:
      type: object
      properties:
        id:
          type: integer
        formInstanceId:
          type: integer
        formDefinitionId:
          type: integer
        value:
          type: string
          nullable: true
        signature:
          type: string
          nullable: true
        pin:
          type: string
          nullable: true
        photoUrl:
          type: string
          nullable: true
        entryDate:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - formInstanceId
        - formDefinitionId
        - entryDate
        - createdAt

    CreateFormEntry:
      type: object
      properties:
        formDefinitionId:
          type: integer
        value:
          type: string
          nullable: true
        signature:
          type: string
          nullable: true
        pin:
          type: string
          nullable: true
        photoUrl:
          type: string
          nullable: true
        entryDate:
          type: string
          format: date
      required:
        - formDefinitionId
        - entryDate

    User:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        name:
          type: string
        email:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date
          nullable: true
        role:
          type: string
          enum: [SUPERADMIN, ADMIN, USER]
        initials:
          type: string
          nullable: true
        pin:
          type: string
          nullable: true
        isRegistered:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - tenantId
        - firstName
        - lastName
        - name
        - role
        - isRegistered
        - createdAt

    RegisterUser:
      type: object
      properties:
        tenantId:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        birthDate:
          type: string
          format: date
        initials:
          type: string
        pin:
          type: string
      required:
        - tenantId
        - firstName
        - lastName
        - birthDate
        - initials
        - pin

    Responsibility:
      type: object
      properties:
        id:
          type: integer
        marketId:
          type: integer
        department:
          type: string
        responsibleName:
          type: string
          nullable: true
        responsiblePhone:
          type: string
          nullable: true
        deputyName:
          type: string
          nullable: true
        deputyPhone:
          type: string
          nullable: true
        sortOrder:
          type: integer
        year:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - marketId
        - department
        - sortOrder
        - year
        - createdAt
        - updatedAt

    UpsertResponsibilities:
      type: object
      properties:
        year:
          type: integer
        items:
          type: array
          items:
            type: object
            properties:
              department:
                type: string
              responsibleName:
                type: string
                nullable: true
              responsiblePhone:
                type: string
                nullable: true
              deputyName:
                type: string
                nullable: true
              deputyPhone:
                type: string
                nullable: true
              sortOrder:
                type: integer
            required:
              - department
              - sortOrder
      required:
        - year
        - items

    MarketInfoResponse:
      type: object
      properties:
        id:
          type: integer
        marketId:
          type: integer
        marketNumber:
          type: string
          nullable: true
        street:
          type: string
          nullable: true
        plzOrt:
          type: string
          nullable: true
        year:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - marketId
        - year
        - createdAt
        - updatedAt

    UpsertMarketInfo:
      type: object
      properties:
        year:
          type: integer
        marketNumber:
          type: string
          nullable: true
        street:
          type: string
          nullable: true
        plzOrt:
          type: string
          nullable: true
      required:
        - year

    TrainingTopic:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        responsible:
          type: string
          nullable: true
        trainingMaterial:
          type: string
          nullable: true
        sortOrder:
          type: integer
        isDefault:
          type: boolean
      required:
        - id
        - title
        - sortOrder
        - isDefault

    TrainingSession:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        marketId:
          type: integer
        sessionDate:
          type: string
          format: date
        trainerId:
          type: integer
          nullable: true
        trainerName:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        attendanceCount:
          type: integer
        topicCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - tenantId
        - marketId
        - sessionDate
        - attendanceCount
        - topicCount
        - createdAt

    TrainingSessionDetail:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        marketId:
          type: integer
        sessionDate:
          type: string
          format: date
        trainerId:
          type: integer
          nullable: true
        trainerName:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        topics:
          type: array
          items:
            $ref: "#/components/schemas/TrainingSessionTopicItem"
        attendances:
          type: array
          items:
            $ref: "#/components/schemas/TrainingAttendance"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - tenantId
        - marketId
        - sessionDate
        - topics
        - attendances
        - createdAt

    TrainingSessionTopicItem:
      type: object
      properties:
        id:
          type: integer
        topicId:
          type: integer
        title:
          type: string
        customTitle:
          type: string
          nullable: true
        responsible:
          type: string
          nullable: true
        trainingMaterial:
          type: string
          nullable: true
        checked:
          type: boolean
      required:
        - id
        - topicId
        - title
        - checked

    TrainingAttendance:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        userId:
          type: integer
        initials:
          type: string
        userName:
          type: string
        confirmedAt:
          type: string
          format: date-time
      required:
        - id
        - sessionId
        - userId
        - initials
        - userName
        - confirmedAt

    CreateTrainingSession:
      type: object
      properties:
        tenantId:
          type: integer
        sessionDate:
          type: string
          format: date
        trainerId:
          type: integer
          nullable: true
        trainerName:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        topicIds:
          type: array
          items:
            type: integer
        customTopicTitle:
          type: string
          nullable: true
      required:
        - tenantId
        - sessionDate
        - topicIds

    UpdateTrainingSession:
      type: object
      properties:
        sessionDate:
          type: string
          format: date
        trainerId:
          type: integer
          nullable: true
        trainerName:
          type: string
          nullable: true
        notes:
